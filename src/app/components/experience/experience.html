<section id="experience" class="py-20 md:py-28 bg-white">
  <div class="section-container">
    <div class="text-center max-w-2xl mx-auto mb-16">
      <span class="text-accent font-semibold text-sm tracking-widest uppercase">Experience</span>
      <h2 class="text-3xl md:text-4xl font-bold text-navy-900 mt-3 mb-4">
        Professional Background
      </h2>
      <p class="text-slate-600">
        Hands-on experience in technical support, development, and customer communication.
      </p>
    </div>

    <div class="max-w-3xl mx-auto space-y-6">
      @for (item of data.experience; track item.title; let i = $index) {
        <div class="relative pl-8 pb-6">
          @if (i < data.experience.length - 1) {
            <div class="absolute left-[11px] top-3 bottom-0 w-0.5 bg-slate-200"></div>
          }
          <div class="absolute left-0 top-1.5 w-6 h-6 rounded-full bg-accent/10 border-2 border-accent flex items-center justify-center">
            <div class="w-2 h-2 rounded-full bg-accent"></div>
          </div>
          <div class="p-6 rounded-xl bg-slate-50 border border-slate-200 shadow-xs card-hover">
            <h3 class="text-lg font-bold text-navy-900 mb-2">{{ item.title }}</h3>
            <p class="text-sm text-slate-600 leading-relaxed">{{ item.description }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
