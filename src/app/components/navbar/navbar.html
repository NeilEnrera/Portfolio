<nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md shadow-sm transition-all duration-300">
  <div class="section-container">
    <div class="flex items-center justify-between h-16 md:h-20">
      <button (click)="scrollTo('hero')" class="flex items-center gap-3 cursor-pointer">
        <span class="text-xl font-bold tracking-tight">
          <span class="text-navy-900">NE</span>
          <span class="text-accent">.</span>
        </span>
        <span class="hidden sm:inline text-xs text-slate-500 font-medium tracking-wide">Full Stack Developer</span>
      </button>

      <div class="hidden md:flex items-center gap-1">
        @for (item of navItems; track item.label) {
          <button
            (click)="scrollTo(item.section)"
            type="button"
            class="nav-link"
            [class.active]="activeSection() === item.section"
          >
            {{ item.label }}
          </button>
        }
      </div>

      <button
        (click)="toggleMenu()"
        class="md:hidden p-2 text-navy-900 cursor-pointer"
        aria-label="Toggle menu"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          @if (isMobileMenuOpen()) {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          } @else {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          }
        </svg>
      </button>
    </div>

    @if (isMobileMenuOpen()) {
      <div class="md:hidden pb-4 border-t border-slate-100">
        <div class="flex flex-col gap-2 pt-4">
          @for (item of navItems; track item.label) {
            <button
              (click)="scrollTo(item.section)"
              type="button"
              class="nav-link text-left"
              [class.active]="activeSection() === item.section"
            >
              {{ item.label }}
            </button>
          }
        </div>
      </div>
    }
  </div>
</nav>
