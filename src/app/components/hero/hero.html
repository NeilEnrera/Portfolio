<section #heroSection id="hero" class="relative min-h-screen flex items-center bg-gradient-to-br from-white via-slate-50 to-blue-50 overflow-hidden">
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-20 right-20 w-72 h-72 bg-accent/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-20 left-20 w-96 h-96 bg-navy-900/5 rounded-full blur-3xl"></div>
  </div>

  <div class="section-container relative z-10 w-full pt-28 pb-16 md:pt-36 md:pb-20">
    <div class="grid lg:grid-cols-2 gap-15 items-center">
      <div class="space-y-15">
        <div class="inline-flex items-center gap-2 px-4 py-2 bg-accent/10 rounded-full text-accent text-sm font-medium">
          <span class="w-2 h-2 bg-accent rounded-full animate-pulse"></span>
          Full Stack Developer
        </div>

        <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-navy-900 leading-tight tracking-tight">
          {{ data.heroHeadline }}
        </h1>

        <p class="text-lg md:text-xl text-slate-600 leading-relaxed max-w-xl">
          {{ data.heroSubtext }}
        </p>

        <div class="flex flex-wrap gap-4">
          <a
            [href]="data.resume.file"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="View resume (PDF)"
            class="px-8 py-3.5 border-2 border-accent/30 text-accent font-semibold rounded-xl hover:bg-accent/5 hover:border-accent/50 transition-all inline-flex items-center gap-2 cursor-pointer"
          >
            <svg class="w-4 h-4" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
            </svg>
            {{ data.resume.label }}
          </a>
        </div>
      </div>

      <div class="flex flex-col items-center">
        <div class="relative group">
          <div class="absolute -inset-3 rounded-2xl bg-gradient-to-br from-navy-900/20 to-navy-700/10 blur-sm -z-10
                      transition-all duration-300 group-hover:scale-105 group-hover:opacity-80"></div>
          <img
            src="images/profile/Profile.png"
            alt="{{ data.name }}"
            class="w-48 h-48 sm:w-64 sm:h-64 lg:w-80 lg:h-80 rounded-2xl object-cover shadow-xl
                   ring-2 ring-white/80 ring-offset-4 ring-offset-transparent
                   transition-all duration-300 group-hover:-translate-y-1 group-hover:shadow-2xl"
          />
          <div class="absolute -bottom-4 -right-4 w-24 h-24 sm:w-28 sm:h-28 lg:w-32 lg:h-32 bg-navy-900/15 rounded-2xl -z-10
                      transition-all duration-300 group-hover:scale-110"></div>
          <div class="absolute -top-4 -left-4 w-20 h-20 sm:w-22 sm:h-22 lg:w-24 lg:h-24 bg-navy-800/20 rounded-2xl -z-10"></div>
        </div>
        <div class="text-center mt-4 lg:mt-6">
          <h2 class="text-xl sm:text-2xl font-bold text-navy-900">{{ data.name }}</h2>
          <p class="text-sm text-slate-500 mt-1">Full Stack Developer</p>
        </div>
      </div>
    </div>
  </div>
</section>
