<section id="hero" class="relative min-h-screen flex items-center bg-gradient-to-br from-white via-slate-50 to-blue-50 overflow-hidden">
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-20 right-20 w-72 h-72 bg-accent/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-20 left-20 w-96 h-96 bg-navy-900/5 rounded-full blur-3xl"></div>
  </div>

  <div class="section-container relative z-10 w-full pt-28 pb-16 md:pt-36 md:pb-20">
    <div class="grid lg:grid-cols-2 gap-15 items-center">
      <div class="space-y-15">
        <div class="inline-flex items-center gap-2 px-4 py-2 bg-accent/10 rounded-full text-accent text-sm font-medium">
          <span class="w-2 h-2 bg-accent rounded-full animate-pulse"></span>
          Full Stack Developer
        </div>

        <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-navy-900 leading-tight tracking-tight">
          {{ data.heroHeadline }}
        </h1>

        <p class="text-lg md:text-xl text-slate-600 leading-relaxed max-w-xl">
          {{ data.heroSubtext }}
        </p>

        <div class="flex flex-wrap gap-4">
          <a
            [href]="data.resume.file"
            target="_blank"
            class="px-8 py-3.5 border-2 border-accent/30 text-accent font-semibold rounded-xl hover:bg-accent/5 hover:border-accent/50 transition-all inline-flex items-center gap-2 cursor-pointer"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            {{ data.resume.label }}
          </a>
        </div>
      </div>

      <div class="hidden lg:flex justify-center">
        <div class="relative">
          <div class="w-80 h-80 rounded-2xl bg-gradient-to-br from-navy-900 to-accent flex items-center justify-center shadow-2xl">
            <span class="text-white text-8xl font-bold opacity-20">NE</span>
          </div>
          <div class="absolute -bottom-4 -right-4 w-32 h-32 bg-accent/10 rounded-2xl -z-10"></div>
          <div class="absolute -top-4 -left-4 w-24 h-24 bg-navy-900/5 rounded-2xl -z-10"></div>
        </div>
      </div>
    </div>
  </div>
</section>
