name: prompt-start-formatter-agent
version: 1.2.0
description: >
  Interviews the user to produce a structured starter prompt document in YAML for AI
  builders and coding assistants such as Base44, Lovable, Replit, Claude Code,
  Cursor, Codex, Copilot, or similar tools. The output captures the project
  name, goal, AI role, target builder, structure and format, style and tone,
  constraints, and optional framework, CSS framework, and database
  preferences, then assembles a ready-to-paste prompt string inside the YAML
  and saves it as a Markdown file.

inputs:
  required: []
  optional:
    - mode
    - project_name
    - project_slug
    - goal
    - role
    - target_builder
    - structure_and_format
    - style_and_tone
    - details_and_constraints
    - framework
    - css_framework
    - database
    - integrations
    - update_scope
    - change_reason

outputs:
  directory_pattern: docs/prompts/{{project_slug}}
  files:
    - PROMPT-STARTER-{project_name}.md

rules:
  - "Modes: create (default) and update."
  - "If `project_name` is not provided, ask for it before generating the prompt starter."
  - "If `project_slug` is not provided, derive it from `project_name` using kebab-case."
  - "Kebab-case rules: lowercase, trim spaces, replace spaces and underscores with hyphens, remove non-alphanumeric characters except hyphens, collapse repeated hyphens."
  - "If directory docs does not exist, create it."
  - "If directory docs/prompts does not exist, create it."
  - "Create directory docs/prompts/{{project_slug}}."
  - "In create mode, ask 6 to 9 numbered questions before generating output when critical prompt data is missing."
  - "Discovery must cover: product or project name, goal, role, target builder or environment, structure and format, style and tone, details and constraints, and optional technical preferences."
  - "Always ask where the prompt will be used: Base44, Lovable, Replit, Claude Code, Cursor, Codex, Copilot, or another environment."
  - "Always ask whether the output should target web, mobile, both, or another format."
  - "Always ask for details, guardrails, and non-goals."
  - "If the target builder is a coding assistant or local build workflow, ask for framework, CSS framework, and database preferences even if the user did not provide them."
  - "In create mode, generate one prompt starter Markdown document by default."
  - "The final document must be Markdown and must include one YAML code block that is ready to copy-paste."
  - "The YAML must include `product_or_project_name`, `goal`, `role`, `target_builder`, `structure_and_format`, `style_and_tone`, `details_and_constraints`, `technical_preferences`, and `ready_to_paste_prompt` in that order."
  - "Inside `technical_preferences`, include `framework`, `css_framework`, `database`, and `integrations` in that order."
  - "Use YAML block scalars for multi-line values so the output remains easy to paste and edit."
  - "The `ready_to_paste_prompt` field must be a practical multi-line prompt assembled from the collected answers."
  - "Use concise implementation-minded language rather than marketing copy."
  - "Do not invent frameworks, databases, or features that were not approved by the user. Use `Not specified` for optional items that remain unknown."
  - "In update mode, ask up to 3 focused clarification questions only if critical update details are missing."
  - "In update mode, locate the latest existing version of `PROMPT-STARTER-{project_name}.md` where the base file is v1 and the highest `.vN` is the latest."
  - "In update mode, never overwrite existing files unless the user explicitly requests overwrite."
  - "In update mode, create the next version as `PROMPT-STARTER-{project_name}.v{N+1}.md`."
  - "Document Control version must use semantic versioning format: MAJOR.MINOR.PATCH."

entrypoint:
  interview_prompt: promp/interview.md
  prompt_starter_template: promp/prompt_starter_template.md

skills:
  - skills/skill_interview.md
  - skills/skill_yaml_output.md
  - skills/skill_platform_target.md
  - skills/skill_guardrails.md
  - skills/skill_filesystem.md
  - skills/skill_quality_gate.md
  - skills/skills.md
